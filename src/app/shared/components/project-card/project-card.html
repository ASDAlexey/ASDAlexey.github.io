<article class="card" [class.card--featured]="project().featured">
  <div class="card__head">
    <h3 class="card__title">{{ project().name }}</h3>
    <span class="card__badge">{{ project().badge }}</span>
  </div>

  <p class="card__desc">{{ project().description }}</p>

  @if (project().image; as image) {
    <button class="card__media" type="button" (click)="lightbox.open()">
      <img
        class="card__media-thumb"
        decoding="async"
        height="84"
        loading="lazy"
        width="160"
        [alt]="project().imageAlt"
        [class.card__media-thumb_contain]="project().imageContain"
        [src]="image"
      />
      <span class="card__media-caption" i18n="@@project.preview">Open full image ↗</span>
    </button>

    <app-image-lightbox #lightbox [alt]="project().imageAlt ?? ''" [src]="image" />
  }

  @if (project().links.length) {
    <ul class="card__links">
      @for (link of project().links; track link.href) {
        <li>
          <a class="card__link" rel="noreferrer" target="_blank" [href]="link.href">{{ link.label }} ↗</a>
        </li>
      }
    </ul>
  }

  <ul class="tags">
    @for (tag of project().tags; track tag) {
      <li class="tags__item">{{ tag }}</li>
    }
  </ul>
</article>
