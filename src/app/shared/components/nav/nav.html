<header class="nav" id="top">
  <div class="nav__inner container">
    <a class="nav__brand" href="#top">
      <span class="nav__logo">
        <img class="nav__avatar" decoding="async" fetchpriority="high" height="38" src="avatar.webp" width="38" [alt]="profile.name" />
      </span>
      <span class="nav__name">{{ profile.name }}</span>
    </a>

    <nav aria-label="Primary" class="nav__links">
      <a href="#about" i18n="@@nav.about">About</a>
      <a href="#experience" i18n="@@nav.experience">Experience</a>
      <a href="#projects" i18n="@@nav.projects">Projects</a>
      <a href="#recommendations" i18n="@@nav.recommendations">Recommendations</a>
      <app-language-switcher />
      <a class="nav__cta" i18n="@@nav.github" rel="noreferrer" target="_blank" [href]="profile.github">GitHub ↗</a>
    </nav>
  </div>
</header>
