<footer class="footer">
  <div appScrollReveal class="container footer__inner reveal--stagger">
    <p class="footer__brand">
      {{ profile.name }} <span class="footer__handle">·&nbsp;&commat;{{ profile.handle }}</span>
    </p>
    <p class="footer__copy" i18n="@@footer.copy">Designed &amp; built with Angular 22 — SSG (prerender), EN/RU, 100% tested.</p>
    <ul class="footer__links">
      @for (social of socials; track social.label) {
        <li>
          <a class="footer__link" rel="noreferrer" target="_blank" [attr.download]="social.download ? '' : null" [href]="social.href">{{
            social.label
          }}</a>
        </li>
      }
    </ul>
  </div>
</footer>
