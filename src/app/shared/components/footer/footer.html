<footer class="footer">
  <div class="container footer__inner">
    <p class="footer__brand">{{ profile.name }}</p>
    <p class="footer__copy" i18n="@@footer.copy">Designed &amp; built with Angular 22 — SSG (prerender), EN/RU, 100% tested.</p>
    <ul class="footer__links">
      @for (social of socials; track social.label) {
        <li>
          <a class="footer__link" rel="noreferrer" target="_blank" [href]="social.href">{{ social.label }}</a>
        </li>
      }
    </ul>
  </div>
</footer>
