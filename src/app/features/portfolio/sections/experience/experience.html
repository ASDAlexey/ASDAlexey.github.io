<section class="section" id="experience">
  <div class="container">
    <p class="section__eyebrow" [appScrollReveal]="'left'">
      <span class="section__num">02</span>&nbsp;—&nbsp;<span i18n="@@nav.experience">Experience</span>
    </p>
    <h2 appScrollReveal class="section__title" i18n="@@experience.title">Where I've shipped</h2>

    <div appScrollReveal class="timeline reveal--stagger">
      @for (experience of experiences; track experience.period) {
        <app-experience-card [experience]="experience" />
      }
    </div>
  </div>
</section>
