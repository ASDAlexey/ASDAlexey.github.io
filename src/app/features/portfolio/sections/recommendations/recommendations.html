<section class="section" id="recommendations">

      <span class="section__num">04</span>&nbsp;—&nbsp;<span i18n="@@nav.recommendations">Recommendations</span>
    </p>
    <h2 class="section__title" i18n="@@recommendations.title">What the people I worked with say</h2>

    </div>
  </div>
</section>
