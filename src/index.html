    <!-- Preload + inline the self-hosted Latin subsets (Inter for copy, JetBrains
         Mono for the code showcase) so above-the-fold text paints the real font
         without a swap flash. Relative paths resolve next to each locale's
         index.html; fontsource (bundled) covers Cyrillic/extended as fallbacks. -->
    <link as="font" crossorigin href="fonts/inter-latin.woff2" rel="preload" type="font/woff2" />
    <link as="font" crossorigin href="fonts/jetbrains-mono-latin.woff2" rel="preload" type="font/woff2" />
    <style>
      @font-face {
        font-style: normal;
        font-weight: 100 900;
        src: url('fonts/inter-latin.woff2') format('woff2-variations');
        font-family: 'Inter Latin';
        font-display: swap;
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }

      @font-face {
        font-style: normal;
        font-weight: 100 900;
        src: url('fonts/jetbrains-mono-latin.woff2') format('woff2-variations');
        font-family: 'JBMono Latin';
        font-display: swap;
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122,
          U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <!-- Without JS the scroll-reveal directive never runs — keep all content visible. -->
    <noscript>
      <style>
        .reveal {
          transform: none !important;
          opacity: 1 !important;
        }
      </style>
    </noscript>
