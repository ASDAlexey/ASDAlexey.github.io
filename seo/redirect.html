    <script>
      (function () {
        var target = '/en/';
        try {
          var stored = sessionStorage.getItem('portfolio-lang');
          if (stored === 'ru' || stored === 'en') {
            target = '/' + stored + '/';
          } else if ((navigator.language || 'en').toLowerCase().indexOf('ru') === 0) {
            target = '/ru/';
          }
        } catch (e) {}
        location.replace(target + (location.hash || ''));
      })();
    </script>
    <meta content="0; url=/en/" http-equiv="refresh" />
